# Fleet deployment (blueprint §12).
#
#   ansible-playbook -i inventory.example.ini deploy.yml -e image_tag=<sha>
#
# One command on your laptop SSHes into every robot, pulls the new lean runtime
# image from GHCR, and restarts the container. Reproducible, no per-robot
# fiddling. Right-sized for a 1-3 robot fleet (heavier tools are overkill).
---
- name: Deploy MiniBot runtime to the fleet
  hosts: robots
  become: true
  gather_facts: false
  vars:
    image: "ghcr.io/robocup/minibot-runtime"
    image_tag: "latest"
    container_name: minibot

  tasks:
    - name: Log in to the container registry
      community.docker.docker_login:
        registry_url: ghcr.io
        username: "{{ ghcr_user }}"
        password: "{{ ghcr_token }}" # supplied via --extra-vars or vault, never committed

    - name: Pull the pinned runtime image
      community.docker.docker_image:
        name: "{{ image }}:{{ image_tag }}"
        source: pull
        force_source: true

    - name: (Re)start the robot container
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ image }}:{{ image_tag }}"
        state: started
        recreate: true
        restart_policy: unless-stopped
        network_mode: host # DDS + GameController UDP
        privileged: true # access /dev/ttyACM0 (MCU serial)
        env:
          ROS_DOMAIN_ID: "42"
          ROBOT_NAME: "{{ robot_name }}"
          PLAYER_ID: "{{ player_id }}"
        command: >
          ros2 launch soccer_bringup robot.launch.py
          sim:=false robot_name:={{ robot_name }} player_id:={{ player_id }}
