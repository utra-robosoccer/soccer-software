# MiniBot fleet inventory (copy to inventory.local.ini and edit; that file is
# git-ignored). Each robot is one Jetson on the 5 GHz team Wi-Fi.
[robots]
robot_1 ansible_host=192.168.0.101 robot_name=robot_1 player_id=1
robot_2 ansible_host=192.168.0.102 robot_name=robot_2 player_id=2
robot_3 ansible_host=192.168.0.103 robot_name=robot_3 player_id=3

[robots:vars]
ansible_user=robocup
ansible_python_interpreter=/usr/bin/python3
